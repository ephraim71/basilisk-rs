name: PR Benchmarks

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-benchmarks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: never
  CARGO_TERM_PROGRESS_WHEN: never

jobs:
  pr-benchmarks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@just

      - name: Fetch assets
        run: just fetch-assets

      - name: Fetch Rust dependencies
        run: cargo fetch --locked

      - name: Measure build and run
        run: |
          mkdir -p .github/tmp
          marker='<!-- basilisk-rs-pr-benchmarks -->'

          /usr/bin/time -f '%e' -o .github/tmp/build-seconds.txt \
            cargo build --locked --release --example full_satellite_stack

          /usr/bin/time -f '%e' -o .github/tmp/run-seconds.txt \
            ./target/release/examples/full_satellite_stack \
            > .github/tmp/full-satellite-stack-output.txt

          build_seconds="$(tr -d '\n' < .github/tmp/build-seconds.txt)"
          run_seconds="$(tr -d '\n' < .github/tmp/run-seconds.txt)"
          simulation_seconds="$(awk '/^simulation_time_s = / { print $3; found=1 } END { if (!found) exit 1 }' .github/tmp/full-satellite-stack-output.txt)"
          binary_size_bytes="$(stat -c '%s' ./target/release/examples/full_satellite_stack)"

          build_size="$(
            awk -v bytes="${binary_size_bytes}" '
              BEGIN {
                split("B KiB MiB GiB", units, " ");
                value = bytes + 0;
                unit = units[1];
                for (i = 1; i <= 4; i++) {
                  unit = units[i];
                  if (value < 1024 || i == 4) {
                    break;
                  }
                  value /= 1024;
                }
                if (unit == "B") {
                  printf "%d B", bytes;
                } else {
                  printf "%.2f %s", value, unit;
                }
              }
            '
          )"

          speedup="$(
            awk -v sim="${simulation_seconds}" -v run="${run_seconds}" '
              BEGIN {
                printf "%.2fx", sim / run;
              }
            '
          )"

          build_time="$(
            awk -v seconds="${build_seconds}" '
              BEGIN {
                if (seconds < 60) {
                  printf "%.2fs", seconds;
                } else {
                  minutes = int(seconds / 60);
                  remaining = seconds - (minutes * 60);
                  printf "%dm %.2fs", minutes, remaining;
                }
              }
            '
          )"

          {
            printf '%s\n' "${marker}"
            printf 'Build size: `%s`\n' "${build_size}"
            printf 'full_satellite_stack runtime speedup: `%s`\n' "${speedup}"
            printf 'Build time: `%s`\n' "${build_time}"
          } > .github/tmp/pr-benchmark-comment.md

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- basilisk-rs-pr-benchmarks -->';
            const body = fs.readFileSync('.github/tmp/pr-benchmark-comment.md', 'utf8').trim();
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
